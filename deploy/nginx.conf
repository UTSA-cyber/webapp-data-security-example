server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any unknown route returns index.html so React Router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Healthcheck endpoint for compose / Nomad
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Long-cache assets — Vite fingerprints them, so safe to cache aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
