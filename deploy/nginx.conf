upstream gotrue {
  server auth:9999;
}

upstream postgrest {
  server rest:3000;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 4m;

  # ---- Static SPA ------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # ---- Supabase Auth (GoTrue) -----------------------------------------
  # The Supabase JS client posts to /auth/v1/* — we strip that prefix so
  # GoTrue (which doesn't know about the /auth/v1/ namespace) receives the
  # plain path.
  location /auth/v1/ {
    proxy_pass http://gotrue/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ---- PostgREST -------------------------------------------------------
  # Same prefix-strip pattern: client hits /rest/v1/<table>, PostgREST sees /<table>.
  location /rest/v1/ {
    proxy_pass http://postgrest/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # PostgREST reads role from the JWT in Authorization header; forward it.
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
  }
}
