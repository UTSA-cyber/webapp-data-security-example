# Self-hosted Supabase + Authentik + the app, mirroring what Phase 4 will
# deploy to Nomad. Run from this directory:
#
#   cp .env.example .env  # then fill in secrets
#   docker compose up --build
#
# After boot:
#   App:       http://localhost:3000
#   Authentik: http://localhost:9000  (admin@example.test / from .env)
#
# Coexists with the Supabase CLI dev stack (which uses 54321-54324).
#
# Startup dependency chain:
#   db        → healthy when accepting connections
#   auth      → after db; runs its own migrations to create auth.users
#   migrator  → after auth is healthy; applies project migrations + seed
#               into the now-populated auth schema. One-shot.
#   rest, app → after migrator completed successfully.

name: webapp-data-security

services:
  # ----- Postgres ------------------------------------------------------
  # Vanilla Postgres 16; we don't need Supabase's bundled extensions for
  # this project. Init script bootstraps the auth schema + supabase roles
  # so GoTrue and PostgREST find what they expect.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/01_init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----- Supabase Auth (GoTrue) ----------------------------------------
  auth:
    image: supabase/gotrue:v2.181.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_EXTERNAL_URL: ${SITE_URL}/auth/v1
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      # Connect as postgres so GoTrue can create its own schema/tables on
      # first boot. In a hardened deploy you'd give it a less-privileged
      # owner of the auth schema only.
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL}
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_EXTERNAL_KEYCLOAK_ENABLED: ${GOTRUE_EXTERNAL_KEYCLOAK_ENABLED:-false}
      GOTRUE_EXTERNAL_KEYCLOAK_CLIENT_ID: ${GOTRUE_EXTERNAL_KEYCLOAK_CLIENT_ID:-}
      GOTRUE_EXTERNAL_KEYCLOAK_SECRET: ${GOTRUE_EXTERNAL_KEYCLOAK_SECRET:-}
      GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI: ${GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI:-}
      GOTRUE_EXTERNAL_KEYCLOAK_URL: ${GOTRUE_EXTERNAL_KEYCLOAK_URL:-}
    expose:
      - 9999
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ----- Migrator: apply project migrations + seed --------------------
  # One-shot: starts after auth is healthy (so auth.users exists), runs
  # all SQL files in /migrations + the seed, then exits 0. Downstream
  # services use service_completed_successfully to wait for it.
  migrator:
    image: postgres:16-alpine
    depends_on:
      auth:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-postgres}
    volumes:
      - ../supabase/migrations:/migrations:ro
      - ../supabase/seed.sql:/seed.sql:ro
      - ./migrator-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    restart: "no"

  # ----- PostgREST (the /rest/v1 endpoint) ----------------------------
  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://authenticator:CHANGE_ME_AUTHENTICATOR@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    expose:
      - 3000

  # ----- The app (Vite build + nginx, also proxies /auth and /rest) ---
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    depends_on:
      migrator:
        condition: service_completed_successfully
    ports:
      - "3000:80"

  # =====================================================================
  # Authentik — the SSO IdP. GoTrue federates here for the "Sign in with
  # SSO" flow.
  # =====================================================================

  authentik-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
    volumes:
      - authentik-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "authentik"]
      interval: 5s
      timeout: 5s
      retries: 10

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  authentik-server: &authentik-base
    image: ghcr.io/goauthentik/server:2024.10
    restart: unless-stopped
    command: server
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    environment: &authentik-env
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_WEBAPP_CLIENT_ID: ${GOTRUE_EXTERNAL_KEYCLOAK_CLIENT_ID:-webapp-client}
      AUTHENTIK_WEBAPP_CLIENT_SECRET: ${GOTRUE_EXTERNAL_KEYCLOAK_SECRET:-change-me}
      GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI: ${GOTRUE_EXTERNAL_KEYCLOAK_REDIRECT_URI:-http://localhost:3000/auth/v1/callback}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
    volumes:
      - ./authentik/blueprints:/blueprints/custom:ro
    ports:
      - "9000:9000"

  authentik-worker:
    <<: *authentik-base
    command: worker
    ports: []

volumes:
  db-data:
  authentik-db-data:
  authentik-redis-data:
